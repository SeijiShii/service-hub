<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="service-hub">
  <!--
    service-hub favicon: 中央 hub (accent #4f9cf9) + 4 周囲 service dots (status 色多様性) + spokes。
    design-system (docs/AI_LOG/D20260526_004_design_system.md): dark cockpit, accent #4f9cf9,
    status-up #34d399 / warn #fbbf24 / down #f87171, border #2a2f3a.
    背景は transparent (ブラウザのタブ色に追随)。
  -->
  <!-- spokes (hub → 4 services、border 色で薄め) -->
  <g stroke="#2a2f3a" stroke-width="1.6" stroke-linecap="round">
    <line x1="16" y1="16" x2="16" y2="5"/>
    <line x1="16" y1="16" x2="27" y2="16"/>
    <line x1="16" y1="16" x2="16" y2="27"/>
    <line x1="16" y1="16" x2="5" y2="16"/>
  </g>
  <!-- 4 service dots (status 色多様性で "ダッシュボード" 感) -->
  <circle cx="16" cy="5" r="3"  fill="#34d399"/> <!-- up: 12時 -->
  <circle cx="27" cy="16" r="3" fill="#fbbf24"/> <!-- warn: 3時 -->
  <circle cx="16" cy="27" r="3" fill="#f87171"/> <!-- down: 6時 -->
  <circle cx="5"  cy="16" r="3" fill="#34d399"/> <!-- up: 9時 -->
  <!-- 中央 hub (accent + 縁取り) -->
  <circle cx="16" cy="16" r="5" fill="#4f9cf9"/>
  <circle cx="16" cy="16" r="5" fill="none" stroke="#0b0e14" stroke-width="1"/>
</svg>
