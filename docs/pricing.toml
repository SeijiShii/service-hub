# 料金参照 SoT (business-observability コストシミュレーション)。
# provider 別の「無料枠上限 (アカウント単位で全 project が共有)」+ 「有料プラン月額」。
# 値は時間で変わるため WebSearch で随時更新し updated を更新する ([論点-BO3])。
# ⚠️ 下記は初期 seed (要 WebSearch 検証)。freeLimits のキーは usage_snapshots の metric_key に揃える。
updated = "2026-05-27"

[[provider]]
provider = "vercel"
plan = "Hobby"
paidPlan = "Pro"
paidPriceMonthUsd = 20
[provider.freeLimits]
bandwidth_bytes = 107374182400      # 約 100 GB/月 (要検証)

[[provider]]
provider = "neon"
plan = "Free"
paidPlan = "Launch"
paidPriceMonthUsd = 19
[provider.freeLimits]
db_storage_bytes = 536870912        # 0.5 GB (要検証)

[[provider]]
provider = "clerk"
plan = "Free"
paidPlan = "Pro"
paidPriceMonthUsd = 25
[provider.freeLimits]
mau = 10000                         # 月間アクティブユーザー (要検証)
